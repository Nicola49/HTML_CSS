<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente mudar o tamanho do seu navegador</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem Flexivel">
    </picture>
    <h1>Reproduzindo áudios</h1>
    <p>Vamos aprender a reproduzir áudios no site.</p>
    <!--<audio src="midia/dexter-meme.mp3" controls autoplay></audio>-->
    <audio preload="metadata" controls>
        <source src="midia/dexter-meme.mp3" type="audio/mpeg">
    </audio>
    <br>
    <!-- <video width="600" poster="imagens/capa.jpg" controls>
        <source src="midia/meu-video.mp4" type="video/mp4">
        <source src="midia/meu-video2.webm" type="video/webm">
        <p>Seu navegador não carrega vídeos</p>
    </video> -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/IOdpUPIHsec?si=PFtzY_WNup3CcO1t" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
