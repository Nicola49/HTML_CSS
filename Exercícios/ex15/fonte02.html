<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: "Old";
            src: url('fonts/OldLondon.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
        }

        h1 {
            font-family: 'Old', Courier, monospace;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Laborum repellat aspernatur, exercitationem ab nesciunt quae voluptatibus unde esse delectus beatae cumque sit repudiandae dicta reprehenderit officia tempora quis modi ipsum.</p>
</body>
</html>
