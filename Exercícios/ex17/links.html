<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:active {
            color: yellow;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        .especial::before {
            content: '⇒ ';
            color: darkgray;
            font-weight: normal;
            text-decoration: none;
        }
        .especial::after {
            content: ' ⇐';
            color: darkgray;
            font-weight: normal;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://www.roblox.com/home" target="_blank">Roblox</a></li>
        <li><a href="https://www.youtube.com/cursoemvideo" target="_blank" class="especial">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/curso/javascript/" target="_blank">Site do Cursoemvideo</a></li>
    </ul>
</body>
</html>
